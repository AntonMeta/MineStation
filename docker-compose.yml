services:
  minecraft:
    image: itzg/minecraft-server
    container_name: mc-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "4G"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "${MC_RCON_PASSWORD}"
      RCON_PORT: 25575
    volumes:
      - ./minecraft_data:/data
    restart: unless-stopped
    networks:
      mc-net:
        ipv4_address: 172.20.0.10

  agent:
    build: ./agent
    container_name: mc-controller
    depends_on:
      - minecraft
    environment:
      - RCON_HOST=minecraft
      - RCON_PASSWORD=${MC_RCON_PASSWORD}
      - RCON_PORT=25575
      - PORT=3000
    ports:
      - "3000:3000"
    restart: unless-stopped
  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    container_name: mc-tunnel
    restart: unless-stopped
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}
    networks:
      - mc-net
    volumes:
      - ./playit_data:/etc/playit

networks:
  mc-net:
    ipam:
      config:
        - subnet: 172.20.0.0/16